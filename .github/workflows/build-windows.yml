name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: WindowsApp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build main process (TypeScript)
        run: npx tsc -p tsconfig.main.json

      - name: Build renderer (Vite)
        run: npx vite build

      - name: Package Windows EXE
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: LyricsCaster-Windows-Setup
          path: |
            WindowsApp/release/*.exe
            WindowsApp/dist/*.exe
          if-no-files-found: warn

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1.${{ github.run_number }}
          name: LyricsCaster Windows v1.1.${{ github.run_number }}
          body: |
            ## LyricsCaster 歌词投屏 Windows版

            ### 更新内容
            - 1:1复刻Mac端所有功能
            - 新增设置面板（API配置管理、健康检测）
            - randomSize动画重写（每行放大字+呼吸特效+退场缩回）
            - charBounce退场散落动画
            - 字体导入（TTF/OTF）
            - 背景图片支持

            ### 安装方法
            1. 下载下方的 .exe 安装文件
            2. 双击运行安装
            3. 安装完成后启动 LyricsCaster
            4. 确保手机和电脑在同一个WiFi网络
            5. iOS端会自动发现并连接
          files: |
            WindowsApp/release/*.exe
            WindowsApp/dist/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
